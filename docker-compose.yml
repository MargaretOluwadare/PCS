version: '3.8'\n\nservices:\n  backend:\n    image: your-backend-image:latest # Replace with actual image or build context\n    environment:\n      - MONGODB_URI=mongodb://mongo:27017/your-database-name # Replace with actual database name\n      - OTHER_ENV_VAR=value # Add other necessary environment variables\n    volumes:\n      - ./backend:/app # This assumes your backend files are located in a folder named 'backend'\n    networks:\n      - app-network\n\n  mongo:\n    image: mongo:latest\n    environment:\n      - MONGO_INITDB_ROOT_USERNAME=your-username # Replace with actual username\n      - MONGO_INITDB_ROOT_PASSWORD=your-password # Replace with actual password\n    volumes:\n      - mongo_data:/data/db\n    networks:\n      - app-network\n\nnetworks:\n  app-network:\n    driver: bridge\n\nvolumes:\n  mongo_data: